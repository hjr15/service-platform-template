# Staging issuer — use during initial setup to avoid Let's Encrypt
# rate limits (5 issuances per certificate name per week on prod).
# Switch to letsencrypt-prod once Ingress configs are stable.
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-staging
spec:
  acme:
    server: https://acme-staging-v02.api.letsencrypt.org/directory
    email: <your-acme-email>
    privateKeySecretRef:
      name: letsencrypt-staging-account
    solvers:
      - selector:
          dnsZones: ["<your-domain>"]
        dns01:
          route53:
            region: us-east-1
            hostedZoneID: <your-route53-hosted-zone-id>
            accessKeyIDSecretRef:
              name: route53-credentials
              key: access-key-id
            secretAccessKeySecretRef:
              name: route53-credentials
              key: secret-access-key
