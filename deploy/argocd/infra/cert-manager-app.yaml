# cert-manager Application — installed by ArgoCD as part of infra tier.
# Chart from OCI mirror at https://charts.jetstack.io/cert-manager.
# Values from this repo's cert-manager/values-dev.yaml.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cert-manager
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  sources:
    - repoURL: https://charts.jetstack.io
      chart: cert-manager
      targetRevision: v1.20.2
      helm:
        releaseName: cert-manager
        valueFiles:
          - $values/cert-manager/values-dev.yaml
    - repoURL: https://github.com/hjr15/service-platform-template.git
      targetRevision: main
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: cert-manager
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
