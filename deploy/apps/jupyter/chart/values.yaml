image:
  # quay.io is the Jupyter project's current registry; the old
  # docker.io/jupyter images are frozen (deprecated mid-2023).
  repository: quay.io/jupyter/datascience-notebook
  # Pinned by digest (never `latest`) so a deploy is reproducible. The tag
  # is kept alongside the digest for human readability; the digest is what
  # actually pins (a multi-arch index — amd64 + arm64). Renovate opens PRs
  # for upstream bumps.
  tag: lab-4.5.8@sha256:ded87b32b354754a7d5e0438a1ed7d65501a25b4a79e5e66e5e507f52e1d68c8
  pullPolicy: IfNotPresent

# Token auth — Jupyter generates a random token on first start unless
# overridden. For lab use, allow a fixed token via env var (set in
# values-dev.yaml or via env_secret).
auth:
  token: ""   # empty = use Jupyter's auto-generated token (printed in pod logs)

persistence:
  size: 10Gi
  # storageClassName left unset — uses cluster default
  mountPath: /home/jovyan/work

ingress:
  enabled: true
  className: traefik
  host: jupyter.svc.localhost
  tls:
    enabled: true
    secretName: jupyter-tls
    # selfsigned is the only ClusterIssuer the default install ships
    # (cert-manager/clusterissuer-selfsigned.yaml). Switch to
    # letsencrypt-prod only after wiring the Route 53 example issuer.
    clusterIssuer: selfsigned

resources:
  requests:
    cpu: 100m
    memory: 512Mi
  limits:
    cpu: 1000m
    memory: 2Gi
