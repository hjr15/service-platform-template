apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: jupyter-work
  labels: {{- include "jupyter.labels" . | nindent 4 }}
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: {{ .Values.persistence.size }}
  {{- with .Values.persistence.storageClassName }}
  storageClassName: {{ . }}
  {{- end }}
